name: Build Uninstall'd

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  # ── Build job: runs on every push and PR ───────────────────────────────────
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build executable with PyInstaller
        run: python -m PyInstaller uninstalld.spec --noconfirm

      - name: Upload portable exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: uninstalld-windows-portable
          path: dist/uninstalld/
          retention-days: 30

  # ── Release job: only runs when a v* tag is pushed ─────────────────────────
  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build executable with PyInstaller
        run: python -m PyInstaller uninstalld.spec --noconfirm

      - name: Install NSIS via Chocolatey
        run: choco install nsis --yes --no-progress

      - name: Build NSIS installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer\setup.nsi
          if ($LASTEXITCODE -ne 0) {
            Write-Error "NSIS failed with exit code $LASTEXITCODE"
            exit 1
          }

      - name: Locate installer and verify
        id: find_installer
        run: |
          Write-Host "=== All .exe files in workspace ==="
          Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Format-Table FullName, Length

          $installer = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter "Uninstalld_Setup_*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1

          if (-not $installer) {
            Write-Error "Installer .exe not found anywhere in workspace!"
            exit 1
          }

          Write-Host "=== Found installer: $($installer.FullName) ==="
          echo "INSTALLER_PATH=$($installer.FullName)" >> $env:GITHUB_ENV
          echo "INSTALLER_NAME=$($installer.Name)" >> $env:GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Uninstall'd ${{ github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: ${{ env.INSTALLER_PATH }}
          body: |
            ## Uninstall'd ${{ github.ref_name }}

            Deep program removal tool for Windows — scans registry, program files, and %TEMP% for every trace of a program.

            ### Install
            1. Download `${{ env.INSTALLER_NAME }}` below
            2. Run it (UAC prompt will appear — click Yes)
            3. Launch **Uninstall'd** from the Start Menu or Desktop

            **Requirements:** Windows 10 or 11 (64-bit)

            ### What's in this release
            See the [Changelog](https://github.com/hawaiizfynest/uninstalld#changelog) for full details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
